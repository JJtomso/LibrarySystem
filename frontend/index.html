<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 图书馆系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container login-page">
        <div style="text-align:center; width:400px;">
            <h1>📚 图书馆系统</h1>
            <h2>登录</h2>
            <input type="text" id="login-id" placeholder="9位学号" maxlength="9" style="width:100%;">
            <br>
            <button id="login-btn" onclick="doLogin()" style="width:100%; margin-top:10px;">登录</button>
            <div id="login-status" style="margin-top:10px;"></div>
            <p style="margin-top:20px;">
                <a href="register.html">注册新账号</a>
            </p>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        async function doLogin() {
            const id = document.getElementById('login-id').value.trim();
            if (id.length !== 9) {
                alert('学号必须为9位');
                return;
            }
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = '登录中...';
            try {
                const readers = await getReaders();
                const found = readers.find(r => r.id === id);
                if (found) {
                    setLoggedReader(id);
                    // 同时存储用户名以便导航显示
                    localStorage.setItem('reader_name', found.name);
                    document.getElementById('login-status').textContent = `✅ 登录成功，欢迎 ${found.name}`;
                    alert(`登录成功，欢迎 ${found.name}`);
                    window.location.href = 'books.html';
                } else {
                    alert('该学号未注册，请先注册');
                    window.location.href = 'register.html';
                }
            } catch (err) {
                alert('登录请求失败：' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }

        // 如果已登录，直接跳转至图书页
        window.onload = function() {
            if (getLoggedReader()) {
                window.location.href = 'books.html';
            }
        };
    </script>
</body>
</html>
