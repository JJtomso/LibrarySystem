<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 图书馆系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container login-page">
        <div style="text-align:center; width:400px;">
            <h1>📚 图书馆系统</h1>
            <h2>登录</h2>
            <input type="text" id="login-id" placeholder="9位学号" maxlength="9" style="width:100%;">
            <br>
            <button id="login-btn" onclick="doLogin()" style="width:100%; margin-top:10px;">登录</button>
            <div id="login-status" style="margin-top:10px;"></div>
            <p style="margin-top:20px;">
                <a href="register.html">注册新账号</a>
            </p>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        async function doLogin() {
            const id = document.getElementById('login-id').value.trim();
            if (id.length !== 9) {
                alert('学号必须为9位');
                return;
            }
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = '登录中...';
            try {
                const data = await loginCheck(id);
                if (data.exists) {
                    // 还需获取读者姓名（可从 /readers 单次查询，但为简单，此处用注册时存储）
                    // 可改为在登录时调用 /readers 查找，但为了性能，仍使用 /readers 仅获取一次
                    const readers = await getReaders();
                    const found = readers.find(r => r.id === id);
                    if (found) {
                        setLoggedReader(id);
                        localStorage.setItem('reader_name', found.name);
                        alert(`登录成功，欢迎 ${found.name}`);
                        window.location.href = 'books.html';
                    } else {
                        // 理论上不会发生
                        alert('账户信息异常，请重新注册');
                        window.location.href = 'register.html';
                    }
                } else {
                    alert('该学号未注册，请先注册');
                    window.location.href = 'register.html';
                }
            } catch (err) {
                alert('登录请求失败：' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }

        window.onload = function() {
            if (getLoggedReader()) {
                window.location.href = 'books.html';
            }
        };
    </script>
</body>
</html>
