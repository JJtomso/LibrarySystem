<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 图书馆系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container login-page">
        <div style="text-align:center; width:400px;">
            <h1>📚 图书馆系统</h1>
            <h2>登录</h2>
            <input type="text" id="login-username" placeholder="学号或admin" style="width:100%;">
            <br>
            <input type="password" id="login-password" placeholder="密码" style="width:100%; margin-top:5px;">
            <br>
            <button id="login-btn" onclick="doLogin()" style="width:100%; margin-top:10px;">登录</button>
            <div id="login-status" style="margin-top:10px;"></div>
            <p style="margin-top:20px;">
                <a href="register.html">注册新账号</a>
            </p>
            <p style="font-size:12px; color:#888; margin-top:10px;">
                学生默认密码：123456<br>
                管理员：admin / Admin@123
            </p>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        async function doLogin() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value.trim();
            if (!username || !password) {
                alert('请填写完整');
                return;
            }
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = '登录中...';
            try {
                const data = await login(username, password);
                if (data.status === 'ok') {
                    setUserInfo(username, data.role, data.name);
                    if (data.role === 'student' && data.need_change === 1) {
                        // 强制修改密码
                        window.location.href = 'change-password.html?force=true';
                    } else {
                        window.location.href = 'books.html';
                    }
                } else {
                    alert('登录失败：' + (data.error || '未知错误'));
                }
            } catch (err) {
                alert('登录请求失败：' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }

        window.onload = function() {
            if (isLoggedIn()) {
                window.location.href = 'books.html';
            }
        };
    </script>
</body>
</html>
