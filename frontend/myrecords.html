<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的借书记录</title>
    <link rel="icon" href="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="app-header"></header>
    <div class="container">
        <h2>📋 我的借书记录</h2>
        <div id="login-info"></div>
        <table border="1" id="records-table">
            <thead><tr><th>图书编号</th><th>借书日期</th><th>应还日期</th><th>归还日期</th><th>逾期天数</th></tr></thead>
            <tbody id="records-tbody"></tbody>
        </table>
    </div>
    <script src="script.js"></script>
    <script src="header.js"></script>
    <script>
        async function loadRecords() {
            // 仅学生可查看
            const username = requireStudent();
            if (!username) return;

            try {
                const data = await getMyRecords(username);
                const tbody = document.getElementById('records-tbody');
                tbody.innerHTML = '';
                data.forEach(r => {
                    const tr = document.createElement('tr');
                    const overdue = r.overdue_days > 0 ? `<span style="color:red;">${r.overdue_days}天</span>` : '0';
                    tr.innerHTML = `
                        <td>${r.book_id}</td>
                        <td>${r.borrow_date}</td>
                        <td>${r.due_date}</td>
                        <td>${r.return_date}</td>
                        <td>${overdue}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                alert('加载记录失败：' + err.message);
            }
        }

        window.onload = function() {
            const username = getUsername();
            const role = getRole();
            let info = '未登录';
            if (username) {
                info = `当前登录：${username} (${role === 'student' ? '学生' : '管理员'})`;
                if (role !== 'student') {
                    document.getElementById('login-info').textContent = info + ' - 管理员无借阅记录';
                    document.getElementById('records-table').style.display = 'none';
                    return;
                }
            }
            document.getElementById('login-info').textContent = info;
            if (username && role === 'student') {
                loadRecords();
            }
        };
    </script>
</body>
</html>
