<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图书浏览 - 图书馆系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="app-header"></header>
    <div class="container">
        <h2>📖 馆藏图书</h2>
        <div id="login-info" style="margin-bottom:10px;"></div>
        <table border="1" id="book-table">
            <thead>
                <tr><th>编号</th><th>书名</th><th>作者</th><th>出版社</th>
                    <th>单价</th><th>存放地点</th><th>状态</th><th>操作</th>
                </tr>
            </thead>
            <tbody id="book-tbody"></tbody>
        </table>
    </div>
    <script src="script.js"></script>
    <script src="header.js"></script>
    <script>
        async function loadBooks() {
            try {
                const data = await getBooks();
                const tbody = document.getElementById('book-tbody');
                tbody.innerHTML = '';
                data.forEach(b => {
                    const tr = document.createElement('tr');
                    // 操作列根据角色显示
                    let actionHtml = '';
                    const role = getRole();
                    if (role === 'student') {
                        actionHtml = `<button onclick="handleBorrow('${b.id}')">借书</button>`;
                    } else if (role === 'admin') {
                        actionHtml = `<span style="color:gray;">管理员不可借</span>`;
                    } else {
                        actionHtml = `<a href="index.html">登录借书</a>`;
                    }
                    tr.innerHTML = `
                        <td>${b.id}</td>
                        <td>${b.name}</td>
                        <td>${b.author}</td>
                        <td>${b.publisher}</td>
                        <td>${b.price.toFixed(2)}</td>
                        <td>${b.location}</td>
                        <td>${b.status}</td>
                        <td>${actionHtml}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                alert('加载图书失败：' + err.message);
            }
        }

        async function handleBorrow(bookId) {
            // 检查是否登录且为学生
            const username = requireLogin();
            if (!username) return;
            if (getRole() !== 'student') {
                alert('只有学生可以借书');
                return;
            }

            const days = prompt('借阅天数（默认30天）：', '30');
            if (days === null) return;
            const daysNum = parseInt(days) || 30;
            if (daysNum <= 0) {
                alert('天数必须大于0');
                return;
            }

            try {
                const data = await apiBorrowBook(username, bookId, daysNum);
                if (data.status === 'ok') {
                    alert(`借书成功！应还日期：${data.due_date}`);
                    loadBooks();
                } else {
                    alert('借书失败：' + (data.error || '未知错误'));
                }
            } catch (err) {
                alert('借书请求失败：' + err.message);
            }
        }

        window.onload = function() {
            const username = getUsername();
            const role = getRole();
            let info = '未登录';
            if (username) {
                info = `当前登录：${username} (${role === 'student' ? '学生' : '管理员'})`;
            }
            document.getElementById('login-info').textContent = info;
            loadBooks();
        };
    </script>
</body>
</html>
