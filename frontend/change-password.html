<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>修改密码</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container login-page">
        <div style="text-align:center; width:400px;">
            <h2>🔐 修改密码</h2>
            <p id="info" style="color:blue;"></p>
            <input type="password" id="old-pwd" placeholder="旧密码" style="width:100%;"><br>
            <input type="password" id="new-pwd" placeholder="新密码（至少6位）" style="width:100%; margin-top:5px;"><br>
            <input type="password" id="confirm-pwd" placeholder="确认新密码" style="width:100%; margin-top:5px;"><br>
            <button id="change-btn" onclick="doChange()" style="width:100%; margin-top:10px;">确认修改</button>
            <div id="result" style="margin-top:10px; color:red;"></div>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        const force = new URLSearchParams(window.location.search).get('force') === 'true';
        if (force) {
            document.getElementById('info').textContent = '⚠️ 系统要求您修改初始密码（默认 123456）';
        }

        async function doChange() {
            const old = document.getElementById('old-pwd').value.trim();
            const newp = document.getElementById('new-pwd').value.trim();
            const confirm = document.getElementById('confirm-pwd').value.trim();
            const btn = document.getElementById('change-btn');
            const resultDiv = document.getElementById('result');

            // 重置样式
            resultDiv.style.color = 'red';
            resultDiv.textContent = '';
            btn.disabled = true;
            btn.textContent = '提交中...';

            // 前端校验
            if (!old || !newp || !confirm) {
                resultDiv.textContent = '❌ 请填写完整';
                btn.disabled = false;
                btn.textContent = '确认修改';
                return;
            }
            if (newp.length < 6) {
                resultDiv.textContent = '❌ 新密码长度至少6位';
                btn.disabled = false;
                btn.textContent = '确认修改';
                return;
            }
            if (newp !== confirm) {
                resultDiv.textContent = '❌ 两次输入密码不一致';
                btn.disabled = false;
                btn.textContent = '确认修改';
                return;
            }

            const username = getUsername();
            if (!username) {
                resultDiv.textContent = '❌ 未登录，请重新登录';
                btn.disabled = false;
                btn.textContent = '确认修改';
                setTimeout(() => { window.location.href = 'index.html'; }, 800);
                return;
            }

            try {
                console.log('[修改密码] 请求参数:', { username, old, newp });
                const data = await changePassword(username, old, newp);
                console.log('[修改密码] 响应:', data);

                if (data.status === 'ok') {
                    // 修改成功：立即跳转
                    resultDiv.style.color = 'green';
                    resultDiv.innerHTML = '✅ 密码修改成功！正在跳转...';
                    window.location.replace('books.html');
                    return;
                } else {
                    resultDiv.style.color = 'red';
                    resultDiv.textContent = '❌ 修改失败：' + (data.error || '未知错误');
                    btn.disabled = false;
                    btn.textContent = '确认修改';
                }
            } catch (err) {
                console.error('[修改密码] 异常:', err);
                resultDiv.style.color = 'red';
                resultDiv.textContent = '❌ 请求异常：' + err.message;
                btn.disabled = false;
                btn.textContent = '确认修改';
            }
        }

        // 未登录时跳转
        window.onload = function() {
            if (!isLoggedIn()) {
                alert('请先登录');
                window.location.href = 'index.html';
            }
        };
    </script>
</body>
</html>
